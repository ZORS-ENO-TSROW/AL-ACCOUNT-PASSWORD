<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AL Account - Reset Password</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #000;
    color: #fff;
    overflow: hidden;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* BACKGROUND CANVAS */
#neural-bg {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* MAIN CONTAINER */
.container {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 40px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 0 60px rgba(255,255,255,0.05);
}

/* LOGO */
.logo {
    text-align: center;
    margin-bottom: 30px;
}

.logo h1 {
    font-size: 32px;
    letter-spacing: 2px;
}

.logo p {
    color: #aaa;
}

/* FORM */
label {
    display: block;
    margin-top: 15px;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: white;
    font-size: 15px;
    transition: 0.3s;
}

input:focus {
    outline: none;
    border-color: #fff;
    box-shadow: 0 0 10px rgba(255,255,255,0.2);
}

/* BUTTON */
button {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ddd;
}

button:disabled {
    opacity: 0.5;
}

/* MESSAGES */
.message {
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 15px;
    text-align: center;
    font-size: 14px;
}

.message.error { background: rgba(255,0,0,0.2); }
.message.success { background: rgba(0,255,0,0.2); }
.message.info { background: rgba(0,150,255,0.2); }

/* SUCCESS */
.success-container {
    text-align: center;
}

.success-icon {
    font-size: 50px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<canvas id="neural-bg"></canvas>

<div class="container">
    <div class="logo">
        <h1>AL Mine</h1>
        <p>Reset Your Password</p>
    </div>

    <div id="form-container">
        <div id="message-container"></div>

        <form id="reset-form">
            <label>New Password</label>
            <input type="password" id="new-password" required minlength="6">

            <label>Confirm Password</label>
            <input type="password" id="confirm-password" required minlength="6">

            <button type="submit" id="submit-btn">Reset Password</button>
        </form>
    </div>

    <div id="success-container" style="display:none;">
        <div class="success-icon">✅</div>
        <h2>Password Updated!</h2>
        <p>You can now close this page and log in.</p>
    </div>
</div>

<script>
/* ===== NEURAL NETWORK BACKGROUND ===== */
const canvas = document.getElementById('neural-bg');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5),
        vy: (Math.random() - 0.5)
    });
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for (let p of particles) {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
        ctx.fillStyle = "white";
        ctx.fill();
    }

    for (let i = 0; i < particles.length; i++) {
        for (let j = i+1; j < particles.length; j++) {
            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < 120) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(animate);
}
animate();

/* ===== YOUR ORIGINAL SUPABASE LOGIC ===== */

// Supabase configuration
const SUPABASE_URL = 'https://vghcyfarsjzresjglfzd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnaGN5ZmFyc2p6cmVzamdsZnpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM2MDk1MjUsImV4cCI6MjA3OTE4NTUyNX0.TBwdx7OtDgsVE6YBCVVB7yGKXp5P7bmwEU0Zk_ZH7Wg';

const form = document.getElementById('reset-form');
const submitBtn = document.getElementById('submit-btn');
const messageContainer = document.getElementById('message-container');
const formContainer = document.getElementById('form-container');
const successContainer = document.getElementById('success-container');

// Get token from URL
const hash = window.location.hash;
const params = new URLSearchParams(hash.substring(1));
const accessToken = params.get('access_token');
const type = params.get('type');

if (!accessToken || type !== 'recovery') {
    showMessage('Invalid or expired reset link.', 'error');
    submitBtn.disabled = true;
}

function showMessage(text, type) {
    messageContainer.innerHTML = `<div class="message ${type}">${text}</div>`;
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match!', 'error');
        return;
    }

    if (newPassword.length < 6) {
        showMessage('Password must be at least 6 characters.', 'error');
        return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Updating Password...';
    showMessage('Updating your password...', 'info');

    try {
        const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${accessToken}`
            },
            body: JSON.stringify({ password: newPassword })
        });

        const data = await response.json();

        if (response.ok) {
            formContainer.style.display = 'none';
            successContainer.style.display = 'block';
        } else {
            showMessage(data.error_description || 'Failed to update password.', 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Reset Password';
        }

    } catch (error) {
        showMessage('Network error. Try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
    }
});
</script>

</body>
</html>
